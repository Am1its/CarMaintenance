services:
  - type: web
    name: car-maintenance-tracker
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: APP_URL
        sync: false
